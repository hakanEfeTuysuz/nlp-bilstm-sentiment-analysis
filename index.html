<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yapay Zeka Film Yorumu Analizi</title>
    <style>
        :root {
            --bg-color: #1e1e2e;
            --container-bg: #282a36;
            --text-color: #f8f8f2;
            --accent-color: #bd93f9;
            --success-color: #50fa7b;
            --danger-color: #ff5555;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            color: var(--accent-color);
            font-size: 24px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            background-color: #191a21;
            color: var(--text-color);
            border: 2px solid #44475a;
            border-radius: 8px;
            padding: 15px;
            font-size: 16px;
            resize: none;
            box-sizing: border-box;
            margin-bottom: 20px;
            outline: none;
        }
        textarea:focus {
            border-color: var(--accent-color);
        }
        button {
            background-color: var(--accent-color);
            color: #282a36;
            border: none;
            padding: 12px 25px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
        }
        button:hover {
            background-color: #ff79c6;
        }
        button:disabled {
            background-color: #6272a4;
            cursor: not-allowed;
        }
        #resultBox {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            display: none;
            font-weight: bold;
            font-size: 18px;
        }
        .olumlu {
            background-color: rgba(80, 250, 123, 0.2);
            border: 2px solid var(--success-color);
            color: var(--success-color);
        }
        .olumsuz {
            background-color: rgba(255, 85, 85, 0.2);
            border: 2px solid var(--danger-color);
            color: var(--danger-color);
        }
        .eminlik {
            font-size: 14px;
            margin-top: 10px;
            font-weight: normal;
            color: #f1fa8c;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎬 NLP Duygu Analizi Modeli</h1>
    <p style="color: #6272a4; font-size: 14px; margin-bottom: 20px;">İngilizce bir film yorumu girin, BiLSTM yapay zeka modelimiz analiz etsin.</p>
    
    <textarea id="yorumInput" placeholder="I absolutely loved this movie! The acting was brilliant..."></textarea>
    
    <button id="analizBtn" onclick="analizEt()">Analiz Et</button>
    
    <div id="resultBox">
        <span id="kararMetni"></span>
        <div id="eminlikOrani" class="eminlik"></div>
    </div>
</div>

<script>
    async function analizEt() {
        const metin = document.getElementById('yorumInput').value.trim();
        const btn = document.getElementById('analizBtn');
        const resultBox = document.getElementById('resultBox');
        const kararMetni = document.getElementById('kararMetni');
        const eminlikOrani = document.getElementById('eminlikOrani');

        if (!metin) {
            alert("Lütfen analiz edilecek bir metin girin.");
            return;
        }

        // Butonu yükleniyor durumuna al
        btn.innerText = "Yapay Zeka Düşünüyor...";
        btn.disabled = true;
        resultBox.style.display = "none";

        try {
            // API'ye İstek Atma (FastAPI'nin çalıştığı port 8000)
            const response = await fetch('http://127.0.0.1:8000/analiz-et', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({ metin: metin })
            });

            if (!response.ok) throw new Error("API'ye ulaşılamadı. Sunucunun çalıştığından emin olun.");

            const data = await response.json();

            // Gelen cevabı ekrana yansıtma
            resultBox.style.display = "block";
            kararMetni.innerText = "Sonuç: " + data.yapay_zeka_karari;
            eminlikOrani.innerText = "Yapay Zeka Eminlik Oranı: %" + data.eminlik_orani_yuzde;

            // Renklendirme
            if (data.yapay_zeka_karari === "Olumlu") {
                resultBox.className = "olumlu";
            } else {
                resultBox.className = "olumsuz";
            }

        } catch (error) {
            alert(error.message);
        } finally {
            // Butonu eski haline getir
            btn.innerText = "Analiz Et";
            btn.disabled = false;
        }
    }
</script>

</body>
</html>
